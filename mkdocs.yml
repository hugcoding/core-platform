site_name: NAS Metadata Platform
site_description: CORE Documentation Portal
site_author: Hugo Hoogendoorn

validation:
  nav:
    omitted_files: ignore

exclude_docs: |
  generated/**

theme:
  name: material
  language: nl
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Donkere modus
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Lichte modus

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: wiki/index.md
  - Architecture: wiki/architecture.md
  - CORE: wiki/core.md
  - Configuration: wiki/configuration.md
  - Operations: wiki/operations.md
  - Project:
      - Overview: project/index.md
      - SCRUM-53 Database Review: project/scrum-53-database-schema-review.md
  - Runtime:
      - Scanner: wiki/scanner.md
      - Metadata Worker: wiki/metadata-worker.md
  - Governance:
      - Standards Overview: wiki/standards.md
      - RFC Overview: wiki/rfc.md
      - ADR:
          - Polling vs Inotify: adr/ADR-0001-polling-vs-inotify.md
      - Standards Sources:
          - Database: standards/database.md
          - Docker: standards/docker.md
          - Documentation: standards/documentation.md
          - Project: standards/project.md
          - Redis: standards/redis.md
          - Releases: standards/releases.md
          - Workers: standards/workers.md
      - RFC Sources:
          - CORE Foundation: rfc/RFC-0001-core-foundation.md
  - Database:
      - PostgreSQL: wiki/postgres.md
      - Views: wiki/database-views.md
  - Infrastructure:
      - Docker: wiki/docker.md
      - Redis: wiki/redis.md
      - Scripts: wiki/scripts.md
  - Documentation:
      - Documentation Generator: wiki/documentation-generator.md
      - Sources: wiki/sources.md
      - Full Generated Documentation: DOCUMENTATIE.md
  - Troubleshooting: wiki/troubleshooting.md
